<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <!-- Helmet Gradient -->
    <linearGradient id="helmetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" stroke="#3b82f6" stroke-width="2.5" />
  
  <!-- Stylized Construction Helmet Group -->
  <g transform="translate(0, -2)">
    <!-- Helmet Crest/Ridge (Top part) -->
    <path d="M47 24 C47 21, 53 21, 53 24 L53 35 L47 35 Z" fill="#f59e0b" opacity="0.8" />
    
    <!-- Helmet Dome (Main Cap) -->
    <path d="M26 48 C26 31, 74 31, 74 48 C74 50, 70 52, 60 52 C50 52, 50 48, 48 48 C46 48, 46 52, 36 52 C28 52, 26 50, 26 48 Z" fill="url(#helmetGrad)" />
    
    <!-- Helmet Brim (Aba do capacete) -->
    <path d="M20 48 C20 47, 24 45, 50 45 C76 45, 80 47, 80 48 C80 50, 75 51, 50 51 C25 51, 20 50, 20 48 Z" fill="#b45309" />
    
    <!-- Helmet Headlamp or Crest Center highlight -->
    <path d="M46 32 C46 30, 54 30, 54 32 L53 38 L47 38 Z" fill="#fef08a" />
    
    <!-- Bold Letter 'T' printed on the helmet dome -->
    <text x="50" y="44" font-family="'Inter', 'Arial Black', sans-serif" font-size="14" font-weight="900" fill="#ffffff" text-anchor="middle">T</text>
  </g>
  
  <!-- Safety shield/protection aesthetic details -->
  <path d="M30 74 L50 84 L70 74" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
</svg>