<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <defs>
    <!-- Background Gradient: Premium deep blue/slate -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Helmet Yellow-Orange Gradient: Bright and corporate -->
    <linearGradient id="helmetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- T-Letter Silver Gradient: High contrast, metallic and clean -->
    <linearGradient id="tGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>

    <!-- Drop Shadow Filter for Helmet and T -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <!-- Outer circle background with Orange/Gold glow border -->
  <circle cx="50" cy="50" r="47" fill="url(#bgGrad)" stroke="#fbbf24" stroke-width="2.5" />
  <circle cx="50" cy="50" r="45" fill="none" stroke="#d97706" stroke-width="1" opacity="0.4" />
  
  <!-- Stylized Construction Helmet + T Group -->
  <g filter="url(#dropShadow)" transform="translate(0, -2)">
    
    <!-- 1. The letter T in silver-white, forming the base and body -->
    <!-- Horizontal Bar of T -->
    <rect x="25" y="47" width="50" height="9" rx="2" fill="url(#tGrad)" />
    <!-- Vertical Stem of T (extends down and rounds off beautifully) -->
    <path d="M44 56 H56 V77 C56 79.2 54.2 81 52 81 H48 C45.8 81 44 79.2 44 77 Z" fill="url(#tGrad)" />

    <!-- 2. The Yellow Safety Helmet resting on top of the T horizontal bar -->
    <!-- Helmet Dome (Main Cap) -->
    <path d="M30 47 C30 27, 70 27, 70 47 Z" fill="url(#helmetGrad)" />

    <!-- Helmet Crest/Ridge (Top part) -->
    <path d="M46 25 C46 21, 54 21, 54 25 L53 34 L47 34 Z" fill="#fbbf24" />
    
    <!-- Helmet Brim (Aba do capacete) -->
    <!-- This overlaps the T's horizontal bar slightly at the top, showing it's sitting ON it -->
    <path d="M22 47 C22 45.5, 27 44, 50 44 C73 44, 78 45.5, 78 47 C78 49, 73 50, 50 50 C27 50, 22 49, 22 47 Z" fill="#b45309" />
    
    <!-- Helmet Crest Highlight -->
    <path d="M46 29 C46 27, 54 27, 54 29 L53 33 L47 33 Z" fill="#fef08a" />
    
  </g>
  
  <!-- Safety shield/protection aesthetic lines at the bottom -->
  <path d="M30 73 L50 83 L70 73" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
  <path d="M36 78 L50 85 L64 78" fill="none" stroke="#d97706" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" />
</svg>